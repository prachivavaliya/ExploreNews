name: Daily News Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Create Google Credentials File
        run: |
          echo '${{ secrets.GOOGLE_CREDS }}' > google_creds.json

      - name: Verify Credentials File
        run: |
          ls -la
          test -f google_creds.json && echo "google_creds.json created successfully"

      - name: Execute Extraction Pipeline
        run: |
          python fetch_news.py
